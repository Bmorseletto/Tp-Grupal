services:
  client_0:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client_0
    depends_on:
    - currency_filter_0
    environment:
    - TRANSACTIONS_INPUT_FILE=/datasets/input_0.csv
    - ACCOUNTS_INPUT_FILE=/datasets/accounts_0.csv
    - OUTPUT_FILE=/output/output_0.csv
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_QUEUE=transactions_queue
    - OUTPUT_QUEUE=Query2_Aggregator
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - AMOUNT_CURRENCY=1
    - CURRENCY_PREFIX=CurrencyFilter
  currency_filter_0:
    build:
      context: ./src/
      dockerfile: usd_filter/Dockerfile
    container_name: currency_filter_0
    depends_on:
      - dollar_amount_filter_0
    environment:
      - ID=0
      - MOM_HOST=rabbitmq
      - AMOUNT_CURRENCY=1
      - FILTER_AMOUNT=1
      - FILTER_PREFIX=CurrencyFilter
      - FILTER_Q1_AMOUNT=1
      - FILTER_Q1_PREFIX=DollarAmtFilter
      - FILTER_Q2_AMOUNT=1
      - FILTER_Q2_PREFIX=MaxTransactionFilter
      - PYTHONUNBUFFERED=1
  dollar_amount_filter_0:
    build:
      context: ./src/
      dockerfile: filter_q1/Dockerfile
    container_name: dollar_amount_filter_0
    depends_on:
      - query_1_aggregator
    environment:
      - ID=0
      - MOM_HOST=rabbitmq
      - OUTPUT_QUEUE=Query1_Aggregator
      - FILTER_AMOUNT=1
      - FILTER_PREFIX=DollarAmtFilter
      - PYTHONUNBUFFERED=1
  query_1_aggregator:
    build:
      context: ./src/
      dockerfile: agg_q1/Dockerfile
    container_name: query_1_aggregator
    depends_on:
      - gateway
    environment:
      - ID=0
      - MOM_HOST=rabbitmq
      - INPUT_QUEUE=Query1_Aggregator
      - OUTPUT_QUEUE=transactions_queue
      - Q1_FILTER_AMOUNT=1
      - Q1_FILTER_PREFIX=DollarAmtFilter
      - PYTHONUNBUFFERED=1
    volumes:
      - ./output:/output
  query_2_aggregator:
    build:
      context: ./src/
      dockerfile: agg_q2/Dockerfile
    container_name: query_2_aggregator
    depends_on:
      - gateway
    environment:
      - ID=0
      - MOM_HOST=rabbitmq
      - INPUT_QUEUE=Query2_Aggregator
      - OUTPUT_QUEUE=transactions_queue
      - Q2_FILTER_AMOUNT=1
      - Q2_FILTER_PREFIX=MaxTransactionFilter
      - PYTHONUNBUFFERED=1
    volumes:
      - ./output:/output
  max_transaction_filter_0:
    build:
      context: ./src/
      dockerfile: filter_q2/Dockerfile
    container_name: max_transaction_filter_0
    depends_on:
      - query_2_aggregator
    environment:
      - ID=0
      - MOM_HOST=rabbitmq
      - OUTPUT_QUEUE=Query2_Aggregator
      - FILTER_AMOUNT=1
      - FILTER_PREFIX=MaxTransactionFilter
      - PYTHONUNBUFFERED=1
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  
